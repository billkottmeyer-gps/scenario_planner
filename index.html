<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111827}
header{background:#0d1b3e;padding:20px 32px;color:white;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}

.scenario-card{background:white;border:1.5px solid #e5e7eb;border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s,background .15s}
.scenario-card:hover{border-color:#93c5fd}
.scenario-card.active{border-color:#2563eb;background:#eff6ff}
.scenario-card h3{font-size:14px;font-weight:600;color:#111827;margin-bottom:4px}
.scenario-card .lean{font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:6px}
.lean-dem{color:#2563eb}.lean-gop{color:#dc2626}.lean-neutral{color:#6b7280}
.lean-partial{color:#0891b2}.lean-mixed{color:#7c3aed}.lean-turnout{color:#059669}.lean-slight{color:#0d9488}
.scenario-card p{font-size:12px;color:#6b7280;line-height:1.4}
.bottom-panel{display:grid;grid-template-columns:300px 1fr;gap:20px}

.filters-card{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:20px}

.slider-row{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-top:4px}

.scenario-badge{background:#1d4ed8;color:white;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}
.results-subtitle{font-size:13px;color:#9ca3af}

// ─── App state ────────────────────────────────────────────────────────────────
let ALL_DATA = []
let selectedState = ""
let selectedScenario = "Blue Flood"
let districtFilter = "All"
let raceFilter = "All"
let multiplier = 1.0

// ─── Derived from selected state ──────────────────────────────────────────────
function stateData() {
  if (!selectedState) return ALL_DATA
  return ALL_DATA.filter(r => r.state === selectedState)
}

function availableStates() {
  return [...new Set(ALL_DATA.map(r => r.state || "??"))].sort()
}

// ─── Calculation ──────────────────────────────────────────────────────────────
function runModel(rows, scenarioName, mult) {
  const scenario = SCENARIOS[scenarioName]
  let bDem=0,bRep=0,bTurnout=0,pDem=0,pRep=0,pTurnout=0
  for (const row of rows) {
    const tMap=SCORE_MAP[row.tScore], sMap=SCORE_MAP[row.sScore]
    if (!tMap||!sMap) continue
    const initT=row.count*tMap.midpoint, initD=initT*sMap.midpoint
    bDem+=initD; bRep+=initT-initD; bTurnout+=initT
    const tD=(scenario.Turnout[tMap.turnout]?.[sMap.partisan]??0)*mult
    const sD=(scenario.Support[tMap.turnout]?.[sMap.partisan]??0)*mult
    const adjT=initT*(1+tD), adjD=((initD/initT)+sD)*adjT
    pDem+=adjD; pRep+=adjT-adjD; pTurnout+=adjT
  }
  return {bDem,bRep,bTurnout,pDem,pRep,pTurnout}
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => Math.round(n).toLocaleString()
const pct = n => (n*100).toFixed(1)+"%"
const deltaEl = (n) => {
  return `<span class="${n>=0?'delta-pos':'delta-neg'}">${n>=0?"+":""}${fmt(n)}</span>`
}

  const labels = {CD:"Congressional Districts", SS:"State Senate", SH:"State House"}
  let opts = '<option value="All">Statewide</option>'
  for (const ch of ["CD","SS","SH"]) {
    if (!chambers.includes(ch)) continue
    const districts = [...new Set(data.filter(r=>r.chamber===ch).map(r=>r.district))]
      .sort((a,b)=>isNaN(a)||isNaN(b)?a.localeCompare(b):+a-+b)
    opts += `<optgroup label="${labels[ch]||ch}">`
    districts.forEach(d => opts+=`<option value="${ch}|${d}">${ch} ${d}</option>`)
    opts += '</optgroup>'
  }
  return opts
}

// ─── State picker ─────────────────────────────────────────────────────────────
function buildStatePicker() {
  const states = availableStates()
  const picker = document.getElementById("statePicker")
  picker.innerHTML = states.map(s =>
    `<option value="${s}"${s===selectedState?" selected":""}>${STATE_NAMES[s]||s} (${s})</option>`
  ).join("")
}

function setState(val) {
  selectedState = val
  districtFilter = "All"
  const name = STATE_NAMES[val] || val
  document.getElementById("pageTitle").textContent = `${name} Election Scenario Tool`
  renderApp()
  renderComposition()
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderScenarios() {
  return Object.entries(SCENARIO_META).map(([name,meta])=>`
    <div class="scenario-card${name===selectedScenario?" active":""}" onclick="selectScenario('${name.replace(/'/g,"\\'")}')">
      <h3>${name}</h3>
      <div class="lean ${meta.cls}">${meta.lean}</div>
      <p>${meta.desc}</p>
    </div>`).join("")
}

function renderResults() {
  let data = stateData().filter(r => r.district && r.district !== "Not Available")

  if (raceFilter !== "All") data = data.filter(r=>r.race===raceFilter)

  let filteredRows = data
  if (districtFilter !== "All") {
    const [ch, dist] = districtFilter.split("|")
    filteredRows = data.filter(r=>r.chamber===ch && r.district===dist)
  }

  const r = runModel(filteredRows, selectedScenario, multiplier)
  const dDem=Math.round(r.pDem-r.bDem), dRep=Math.round(r.pRep-r.bRep), dT=Math.round(r.pTurnout-r.bTurnout)
  const bPct=r.bTurnout>0?r.bDem/r.bTurnout:0
  const pPct=r.pTurnout>0?r.pDem/r.pTurnout:0
  const shift=(pPct-bPct)*100

  const distLabel = districtFilter==="All" ? "Statewide" : districtFilter.replace("|"," ")
  const raceLabel = raceFilter==="All" ? "All Groups" :
    ({W:"White",B:"Black",H:"Hispanic",A:"Asian/PI",N:"Native American",U:"Uncoded"}[raceFilter]||raceFilter)

  return `
    <div class="results-header">
      <h2>Results</h2>
      <span class="scenario-badge">${selectedScenario}</span>
      <span class="results-subtitle">${distLabel} · ${raceLabel}</span>
    </div>
    <table class="results-table">
      <thead><tr><th></th><th>Baseline</th><th>Projected</th><th>Delta</th></tr></thead>
      <tbody>
        <tr><td>Dem Votes</td><td class="num">${fmt(r.bDem)}</td><td class="bold-num">${fmt(r.pDem)}</td><td class="delta-cell">${deltaEl(dDem)}</td></tr>
        <tr><td>Rep Votes</td><td class="num">${fmt(r.bRep)}</td><td class="bold-num">${fmt(r.pRep)}</td><td class="delta-cell">${deltaEl(dRep)}</td></tr>
        <tr><td>Total Turnout</td><td class="num">${fmt(r.bTurnout)}</td><td class="bold-num">${fmt(r.pTurnout)}</td><td class="delta-cell">${deltaEl(dT)}</td></tr>
      </tbody>
    </table>
    <div class="stats-row">
      <div class="stat"><span class="stat-label">Baseline Dem%</span><span class="stat-value">${pct(bPct)}</span></div>
      <span class="arrow">→</span>
      <div class="stat"><span class="stat-label">Projected Dem%</span><span class="stat-value">${pct(pPct)}</span></div>
      <div class="stat"><span class="stat-label">Margin Shift</span><span class="shift-badge${shift<0?" neg":""}">${shift>=0?"+":""}${shift.toFixed(1)}pts</span></div>
    </div>`
}

function renderApp() {
  const data = stateData().filter(r=>r.district && r.district!=="Not Available")
  document.getElementById("app").innerHTML = `
    <div class="section-label">Select Scenario</div>
    <div class="scenario-grid">${renderScenarios()}</div>
    <div class="bottom-panel">
      <div class="filters-card">
        <h2>Filters &amp; Controls</h2>
        <div class="filter-group">
          <label>District</label>
          <select id="districtFilter" onchange="setDistrict(this.value)">
            ${buildDistrictOptions(data)}
          </select>
        </div>
        <div class="filter-group">
          <label>Race / Ethnicity</label>
          <select id="raceFilter" onchange="setRace(this.value)">
            <option value="All">All Groups</option>
            <option value="W">White</option>
            <option value="B">Black</option>
            <option value="H">Hispanic or Latino</option>
            <option value="A">Asian or Pacific Islander</option>
            <option value="N">Native American</option>
            <option value="U">Uncoded</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Scenario Multiplier: <span id="multLabel">100%</span></label>
          <input type="range" id="multSlider" min="0" max="300" value="100" step="1" oninput="setMultiplier(this.value)">
          <div class="slider-row"><span>0%</span><span>100%</span><span>300%</span></div>
        </div>
      </div>
      <div class="results-card" id="resultsCard">${renderResults()}</div>
    </div>`

  // Restore filter selections
  if (districtFilter !== "All") {
    const el = document.getElementById("districtFilter")
    if (el) el.value = districtFilter
  }
  if (raceFilter !== "All") {
    const el = document.getElementById("raceFilter")
    if (el) el.value = raceFilter
  }
}

function selectScenario(name) { selectedScenario=name; renderApp(); renderComposition() }
function setDistrict(val)     { districtFilter=val; document.getElementById("resultsCard").innerHTML=renderResults() }
function setRace(val)         { raceFilter=val; document.getElementById("resultsCard").innerHTML=renderResults() }
function setMultiplier(val)   { multiplier=val/100; document.getElementById("multLabel").textContent=val+"%"; document.getElementById("resultsCard").innerHTML=renderResults(); renderComposition() }

// ─── Composition data (loaded from composition.json) ─────────────────────────
let COMPOSITION = {}

// ─── Seat projection per chamber (ignores district/race filters) ──────────────
function projectSeats(chamber, scenarioName, mult) {
  const rows = ALL_DATA.filter(r => r.state === selectedState && r.chamber === chamber && r.district && r.district !== "Not Available")
  const scenario = SCENARIOS[scenarioName]
  const districts = {}
  for (const row of rows) {
    const tMap = SCORE_MAP[row.tScore], sMap = SCORE_MAP[row.sScore]
    if (!tMap || !sMap) continue
    if (!districts[row.district]) districts[row.district] = {adjDem:0, adjRep:0}
    const initT = row.count * tMap.midpoint
    const initD = initT * sMap.midpoint
    const tD = (scenario.Turnout[tMap.turnout]?.[sMap.partisan] ?? 0) * mult
    const sD = (scenario.Support[tMap.turnout]?.[sMap.partisan] ?? 0) * mult
    const adjT = initT * (1 + tD)
    const adjD = ((initD / initT) + sD) * adjT
    districts[row.district].adjDem += adjD
    districts[row.district].adjRep += (adjT - adjD)
  }
  return Object.values(districts).filter(d => d.adjDem > d.adjRep).length
}

// ─── Render composition scoreboard ───────────────────────────────────────────
function renderComposition() {
  const comp = COMPOSITION[selectedState]
  const el = document.getElementById("compSection")
  if (!el) return
  if (!comp) { el.innerHTML = ""; return }

  const chambers = [
    { key:"CD", label:"Congressional districts", sub:`${comp.CD?.total||0} total seats` },
    { key:"SS", label:"State senate",            sub:`${comp.SS?.total||0} total seats` },
    { key:"SH", label:"State house",             sub:`${comp.SH?.total||0} total seats` }
  ].filter(c => comp[c.key])

  function seatBar(d, r, i, total) {
    const dp = total > 0 ? (d/total*100).toFixed(1) : 0
    const ip = total > 0 ? (i/total*100).toFixed(1) : 0
    return `<div class="bar-w"><div class="bar-d" style="width:${dp}%"></div><div class="bar-i" style="width:${ip}%"></div></div>`
  }

  function seatBadge(delta) {
    if (delta > 0) return `<span class="cdp">+${delta} seats</span>`
    if (delta < 0) return `<span class="cdn">${delta} seats</span>`
    return `<span class="cdn0">+0 seats</span>`
  }

  function currentCell(c) {
    const {d,r,i,total} = c
    const parts = [`<span class="sd">${d}D</span><span class="ss">/</span><span class="sr">${r}R</span>`]
    if (i > 0) parts.push(`<span class="ss">/</span><span class="si">${i}I</span>`)
    const pct = total > 0 ? (d/total*100).toFixed(1) : 0
    return `<div class="seat-row">${parts.join("")}</div>${seatBar(d,r,i,total)}<div class="pct-lbl">${pct}% Dem${i>0?" · "+i+" Ind":""}</div>`
  }

  function modelCell(projD, total, showDelta, currentD) {
    const projR = total - projD
    const pct = total > 0 ? (projD/total*100).toFixed(1) : 0
    const bar = `<div class="bar-w"><div class="bar-d" style="width:${pct}%"></div></div>`
    if (showDelta) {
      return `<div class="seat-row"><span class="sd">${projD}D</span><span class="ss">/</span><span class="sr">${projR}R</span></div>${bar}<div style="margin-top:4px">${seatBadge(projD - currentD)}</div>`
    }
    return `<div class="seat-row"><span class="sd">${projD}D</span><span class="ss">/</span><span class="sr">${projR}R</span></div>${bar}<div class="pct-lbl">${pct}% Dem</div>`
  }

  const rows = chambers.map(c => {
    const cv = comp[c.key]
    const baseSeats = projectSeats(c.key, "Baseline", 1.0)
    const projSeats = projectSeats(c.key, selectedScenario, multiplier)
    return `<tr>
      <td><div class="ch-name">${c.label}</div><div class="ch-sub">${c.sub}</div></td>
      <td>${currentCell(cv)}</td>
      <td class="col-sep">${modelCell(baseSeats, cv.total, false, cv.d)}</td>
      <td class="col-sep">${modelCell(projSeats, cv.total, true, cv.d)}</td>
    </tr>`
  }).join("")

  el.innerHTML = `<div class="comp-card">
    <div class="comp-hdr">
      <span class="comp-title">Partisan seat composition</span>
      <span class="scenario-badge">${selectedScenario} · ${Math.round(multiplier*100)}% multiplier</span>
    </div>
    <div class="comp-note">
      Current composition from NCSL. Baseline and projected use all statewide voter data — district and race/ethnicity filters do not apply here. Win threshold: D &gt; 50% of two-party vote per district. <strong>Model does not include votes cast for independent candidates — independent seats shown in current composition only.</strong>
    </div>
    <table class="comp-tbl">
      <thead><tr>
        <th></th>
        <th>Current (NCSL)</th>
        <th class="col-sep">Baseline model</th>
        <th class="col-sep">Projected · Delta vs current</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="comp-legend">
      <div class="cl-item"><div class="cl-dot" style="background:#185FA5"></div> Democrat</div>
      <div class="cl-item"><div class="cl-dot" style="background:#A32D2D"></div> Republican</div>
      <div class="cl-item"><div class="cl-dot" style="background:#c4c3bc"></div> Independent (current only)</div>
      <div class="cl-item" style="margin-left:auto;font-size:11px;color:#9ca3af">Source: NCSL · updated ${comp._updated||""}</div>
    </div>
  </div>`
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
Promise.all([
  fetch("voter-model/src/data/voter_model.json").then(r => { if(!r.ok) throw new Error(`voter_model.json: HTTP ${r.status}`); return r.json() }),
  fetch("voter-model/src/data/composition.json").then(r => { if(!r.ok) throw new Error(`composition.json: HTTP ${r.status}`); return r.json() })
])
  .then(([voterData, compData]) => {
    ALL_DATA = voterData.filter(r => r.district && r.district !== "Not Available")
    COMPOSITION = compData
    const states = availableStates()
    selectedState = states[0] || ""
    buildStatePicker()
    const name = STATE_NAMES[selectedState] || selectedState
    document.getElementById("pageTitle").textContent = `${name} Election Scenario Tool`
    renderApp()
    renderComposition()
  })
  .catch(err => {
    document.getElementById("app").innerHTML = `
      <div class="error-msg">
        <strong>Could not load data.</strong><br><br>
        Expected files at: <code>voter-model/src/data/voter_model.json</code> and <code>voter-model/src/data/composition.json</code><br><br>
        Details: ${err.message}
      </div>`
  })
</script>
</body>
</html>
