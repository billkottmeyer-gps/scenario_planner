name: Auto Changelog

on:
  push:
    branches:
      - main

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Append to changelog
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          MSG="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          echo "## $DATE — $AUTHOR" >> CHANGELOG.md
          echo "$MSG" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md
          git commit -m "Auto-update changelog" || echo "Nothing to commit"
          git push
```

**Step 5.** Scroll down and click **Commit new file**

---

## That's It — How It Works From Now On

Every single time anyone pushes anything to the repo — a new data file, a changed scenario, anything — GitHub automatically adds a line to `CHANGELOG.md` with the date, who did it, and the commit message.

**So the only thing you have to do** is write a clear commit message when you upload files. Instead of leaving it as the default "Upload files", change it to something like:
```
Data refresh: Mississippi April 2026 — added SS and SH exports
```

or
```
Updated Blue Flood scenario — increased Swing turnout delta
