name: Process TargetSmart Data

on:
  push:
    paths:
      - 'voter-model/data/raw/**.csv'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd voter-model && npm install papaparse

      - name: Process all CSV exports
        run: cd voter-model && node scripts/csv_to_json.js all

      - name: Commit updated voter_model.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add voter-model/src/data/voter_model.json
          git commit -m "Auto: regenerated voter_model.json from CSV exports" || echo "No changes"
          git push
