name: Process TargetSmart Data

on:
  workflow_dispatch:
  push:
    paths:
      - 'voter-model/data/raw/**'
jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd voter-model && npm install papaparse

      - name: Process all CSV exports
        run: cd voter-model && node scripts/csv_to_json.js all

      - name: Commit updated voter_model.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add voter-model/voter_model.json
          git diff --staged --quiet && exit 0
          git commit -m "Auto: regenerated voter_model.json from CSV exports"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep 3
          done
          exit 1
